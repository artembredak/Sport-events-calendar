<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Event | Sports Calendar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        html, body { height: 100%; }
        body { background: #f0f2f5; display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
        .navbar-brand { font-weight: 700; letter-spacing: -.3px; }
        footer { background: #212529; color: #adb5bd; }

        .form-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.08); max-width: 640px; }
        .form-section-title { font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
            color: #6c757d; padding-bottom: .5rem; border-bottom: 1px solid #e9ecef; margin-bottom: 1rem; }
        .required-star { color: #dc3545; }
        .form-label { font-weight: 500; font-size: .9rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{/events}">
            <i class="bi bi-calendar-event-fill me-2 text-primary"></i>Sports Calendar
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/events}">
                        <i class="bi bi-calendar3 me-1"></i>Events
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/events}" class="text-decoration-none">Events</a></li>
            <li class="breadcrumb-item active">Add Event</li>
        </ol>
    </nav>

    <h1 class="h4 fw-bold mb-4">
        <i class="bi bi-plus-circle me-2 text-success"></i>Add New Event
    </h1>

    <div class="card form-card">
        <div class="card-body p-4">
            <form method="post" th:action="@{/events}" novalidate data-testid="event-form">

                <!-- When -->
                <div class="form-section-title">When</div>
                <div class="row g-3 mb-4">
                    <div class="col-sm-6">
                        <label for="eventDate" class="form-label">Date <span class="required-star">*</span></label>
                        <input id="eventDate" name="eventDate" type="date" class="form-control"
                               required data-testid="event-date-input"/>
                    </div>
                    <div class="col-sm-6">
                        <label for="eventTime" class="form-label">Time <span class="required-star">*</span></label>
                        <input id="eventTime" name="eventTime" type="time" class="form-control"
                               required data-testid="event-time-input"/>
                    </div>
                </div>

                <!-- Competition & Stage -->
                <div class="form-section-title">Competition</div>
                <div class="row g-3 mb-4">
                    <div class="col-sm-7">
                        <label for="competitionId" class="form-label">Competition <span class="required-star">*</span></label>
                        <select id="competitionId" name="competitionId" class="form-select" required data-testid="competition-select">
                            <option value="" disabled selected>Select competition…</option>
                            <option th:each="c : ${competitions}" th:value="${c.id()}"
                                    th:text="${c.name() + ' · ' + c.season()}"></option>
                        </select>
                    </div>
                    <div class="col-sm-5">
                        <label for="stageId" class="form-label">Stage <span class="required-star">*</span></label>
                        <select id="stageId" name="stageId" class="form-select" required data-testid="stage-select">
                            <option value="" disabled selected>Select stage…</option>
                            <option th:each="s : ${stages}" th:value="${s.id()}" th:text="${s.name()}"></option>
                        </select>
                    </div>
                </div>

                <!-- Status -->
                <div class="mb-4">
                    <label class="form-label d-block">Status <span class="required-star">*</span></label>
                    <div class="d-flex gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="status" id="statusScheduled"
                                   value="SCHEDULED" checked data-testid="status-select"/>
                            <label class="form-check-label" for="statusScheduled">
                                <span class="badge bg-primary me-1">Scheduled</span>
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="status" id="statusPlayed" value="PLAYED"/>
                            <label class="form-check-label" for="statusPlayed">
                                <span class="badge bg-success me-1">Played</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Teams -->
                <div class="form-section-title">Teams</div>
                <div class="row g-3 mb-4">
                    <div class="col-sm-6">
                        <label for="homeTeamId" class="form-label">
                            Home Team
                            <span class="text-muted fw-normal small ms-1">optional</span>
                        </label>
                        <select id="homeTeamId" name="homeTeamId" class="form-select" data-testid="home-team-select">
                            <option value="">— None (e.g. Finals) —</option>
                            <option th:each="t : ${teams}" th:value="${t.id()}"
                                    th:text="${t.name() + (t.countryCode() != null ? ' · ' + t.countryCode() : '')}"></option>
                        </select>
                    </div>
                    <div class="col-sm-6">
                        <label for="awayTeamId" class="form-label">Away Team</label>
                        <select id="awayTeamId" name="awayTeamId" class="form-select" data-testid="away-team-select">
                            <option value="">— None —</option>
                            <option th:each="t : ${teams}" th:value="${t.id()}"
                                    th:text="${t.name() + (t.countryCode() != null ? ' · ' + t.countryCode() : '')}"></option>
                        </select>
                    </div>
                </div>

                <!-- Actions -->
                <div class="d-flex gap-2 pt-2 border-top">
                    <button type="submit" class="btn btn-success px-4" data-testid="save-btn">
                        <i class="bi bi-check-lg me-1"></i>Save Event
                    </button>
                    <a th:href="@{/events}" class="btn btn-outline-secondary" data-testid="cancel-link">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>

</main>

<footer class="py-3 mt-5">
    <div class="container text-center">
        <small>Sports Event Calendar &mdash; AFC Champions League 2024</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXHqTjXJ/7KZ6Y/EFy9ys+qU" crossorigin="anonymous"></script>
</body>
</html>
