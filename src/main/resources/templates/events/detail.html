<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Detail | Sports Calendar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        html, body { height: 100%; }
        body { background: #f0f2f5; display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
        .navbar-brand { font-weight: 700; letter-spacing: -.3px; }
        footer { background: #212529; color: #adb5bd; }

        .detail-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.1); overflow: hidden; }

        /* Match hero */
        .match-hero { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 2rem 1.5rem; }
        .team-hero-name { font-size: 1.15rem; font-weight: 700; text-align: center; }
        .team-hero-code { display: inline-block; font-size: .7rem; font-weight: 700; letter-spacing: .08em;
            background: rgba(255,255,255,.15); border-radius: 4px; padding: 2px 6px; margin-top: .3rem; }
        .score-hero { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; line-height: 1; }
        .score-sep  { font-size: 2rem; font-weight: 200; opacity: .4; margin: 0 .25rem; }
        .vs-text    { font-size: 1.1rem; opacity: .5; font-weight: 300; }

        /* Meta details */
        .meta-label { font-size: .7rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #9ca3af; margin-bottom: .2rem; }
        .meta-value { font-size: .95rem; font-weight: 500; color: #212529; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{/events}">
            <i class="bi bi-calendar-event-fill me-2 text-primary"></i>Sports Calendar
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/events}">
                        <i class="bi bi-calendar3 me-1"></i>Events
                    </a>
                </li>
            </ul>

        </div>
    </div>
</nav>

<main class="container py-4" style="max-width: 720px;" data-testid="event-detail-container">

    <a th:href="@{/events}" class="btn btn-sm btn-outline-secondary mb-3" data-testid="back-btn">
        <i class="bi bi-arrow-left me-1"></i>Back to Events
    </a>

    <div class="detail-card">

        <!-- Match hero: dark gradient with teams + score -->
        <div class="match-hero">

            <!-- Competition + stage + status -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <span class="fw-semibold" th:text="${event.competitionName()}"></span>
                    <span class="opacity-50 ms-2 small" th:text="${event.season()}"></span>
                    <span class="ms-2 opacity-75 small" th:text="${event.stageName()}"></span>
                </div>
                <span th:if="${event.status() == 'PLAYED'}"  class="badge bg-success">Played</span>
                <span th:if="${event.status() == 'SCHEDULED'}" class="badge bg-primary">Scheduled</span>
                <span th:if="${event.status() != 'PLAYED' and event.status() != 'SCHEDULED'}"
                      class="badge bg-secondary" th:text="${event.status()}"></span>
            </div>

            <!-- Teams + score -->
            <div class="row align-items-center g-2 text-center">

                <!-- Home team -->
                <div class="col-5" data-testid="home-team-section">
                    <th:block th:if="${event.homeTeam() != null}">
                        <div class="team-hero-name" th:text="${event.homeTeam().name()}"></div>
                        <span class="team-hero-code" th:if="${event.homeTeam().countryCode() != null}"
                              th:text="${event.homeTeam().countryCode()}"></span>
                    </th:block>
                    <div th:if="${event.homeTeam() == null}" class="opacity-40 fst-italic small">TBD</div>
                </div>

                <!-- Score or vs -->
                <div class="col-2" data-testid="score-section">
                    <th:block th:if="${event.status() == 'PLAYED' and event.homeGoals() != null and event.awayGoals() != null}">
                        <div class="d-flex align-items-center justify-content-center">
                            <span class="score-hero" th:text="${event.homeGoals()}" data-testid="score-value"></span>
                            <span class="score-sep">–</span>
                            <span class="score-hero" th:text="${event.awayGoals()}"></span>
                        </div>
                    </th:block>
                    <div th:if="${event.status() != 'PLAYED' or event.homeGoals() == null or event.awayGoals() == null}"
                         class="vs-text" data-testid="no-score-value">vs</div>
                </div>

                <!-- Away team -->
                <div class="col-5" data-testid="away-team-section">
                    <th:block th:if="${event.awayTeam() != null}">
                        <div class="team-hero-name" th:text="${event.awayTeam().name()}"></div>
                        <span class="team-hero-code" th:if="${event.awayTeam().countryCode() != null}"
                              th:text="${event.awayTeam().countryCode()}"></span>
                    </th:block>
                    <div th:if="${event.awayTeam() == null}" class="opacity-40 fst-italic small">TBD</div>
                </div>
            </div>

            <!-- Winner banner -->
            <div th:if="${event.winner() != null}"
                 class="mt-3 text-center bg-warning bg-opacity-25 rounded-2 py-1 px-2" data-testid="winner-section">
                <i class="bi bi-trophy-fill me-1 text-warning"></i>
                <span class="small fw-semibold">Winner: </span>
                <span class="small fw-bold" th:text="${event.winner()}"></span>
            </div>

        </div><!-- /match-hero -->

        <!-- Meta details grid -->
        <div class="card-body p-4">
            <div class="row g-4">
                <div class="col-6 col-sm-4">
                    <div class="meta-label">Date</div>
                    <div class="meta-value" th:text="${#temporals.format(event.eventDate(), 'dd MMM yyyy')}" data-testid="event-date"></div>
                </div>
                <div class="col-6 col-sm-4">
                    <div class="meta-label">Time</div>
                    <div class="meta-value" th:text="${#temporals.format(event.eventTime(), 'HH:mm')}" data-testid="event-time"></div>
                </div>
                <div class="col-6 col-sm-4">
                    <div class="meta-label">Sport</div>
                    <div class="meta-value" th:text="${event.sportName()}" data-testid="event-sport"></div>
                </div>
                <div class="col-6 col-sm-4">
                    <div class="meta-label">Stage</div>
                    <div class="meta-value" th:text="${event.stageName()}" data-testid="event-stage"></div>
                </div>
                <div class="col-6 col-sm-4">
                    <div class="meta-label">Venue</div>
                    <div class="meta-value" data-testid="venue-section">
                        <th:block th:if="${event.venueName() != null}">
                            <span th:text="${event.venueName()}"></span>
                            <span th:if="${event.venueCity() != null}" class="text-muted small ms-1"
                                  th:text="'· ' + ${event.venueCity()}"></span>
                        </th:block>
                        <span th:if="${event.venueName() == null}" class="text-muted">—</span>
                    </div>
                </div>
                <div class="col-6 col-sm-4">
                    <div class="meta-label">Event ID</div>
                    <div class="meta-value font-monospace text-muted" th:text="'#' + ${event.id()}" data-testid="event-id"></div>
                </div>
            </div>
        </div>

        <div class="card-footer bg-transparent text-end pb-3 pe-4">
            <a th:href="@{/events}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Back to Events
            </a>
        </div>

    </div><!-- /detail-card -->

</main>

<footer class="py-3 mt-5">
    <div class="container text-center">
        <small>Sports Event Calendar &mdash; AFC Champions League 2024</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXHqTjXJ/7KZ6Y/EFy9ys+qU" crossorigin="anonymous"></script>
</body>
</html>
