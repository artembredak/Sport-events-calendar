<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle != null ? pageTitle + ' | Sports Calendar' : 'Sport Events Calendar'}">Sport Events Calendar</title>

    <!-- Bootstrap 5 CSS -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    />

    <!-- Bootstrap Icons -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
        }
        .badge-played {
            background-color: #198754;
        }
        .badge-scheduled {
            background-color: #0d6efd;
        }
        footer {
            background-color: #212529;
            color: #adb5bd;
        }
        .score-display {
            font-weight: 700;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark" aria-label="Main navigation">
    <div class="container">
        <a class="navbar-brand" th:href="@{/events}">
            <i class="bi bi-calendar-event me-2" aria-hidden="true"></i>Sports Calendar
        </a>

        <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNav"
                aria-controls="mainNav"
                aria-expanded="false"
                aria-label="Toggle navigation"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/events}" aria-label="View all events">
                        <i class="bi bi-list-ul me-1" aria-hidden="true"></i>Events
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main content -->
<main class="container py-4" id="main-content">
    <div th:replace="~{::content}"></div>
</main>

<!-- Footer -->
<footer class="py-3 mt-5">
    <div class="container text-center">
        <small>Sports Event Calendar &mdash; AFC Champions League 2024</small>
    </div>
</footer>

<!-- Bootstrap 5 JS Bundle -->
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFXHqTjXJ/7KZ6Y/EFy9ys+qU"
        crossorigin="anonymous"
></script>
</body>
</html>
