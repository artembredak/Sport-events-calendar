services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sport_events
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sport_events"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sport_events
      SPRING_DATASOURCE_USERNAME: "YOUR_USERNAME"
      SPRING_DATASOURCE_PASSWORD: "YOUR_PASSWORD"
    depends_on:
      db:
        condition: service_healthy
